name: Deploy

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: deploy via ssh
              uses: appleboy/ssh-action@v1

              with:
                host: ${{ secrets.SERVER_HOST }}
                username: ${{ secrets.USER }}
                key: ${{ secrets.SSH_PRIVATE_KEY }}

                scripts:
                    ~/deploy.sh
